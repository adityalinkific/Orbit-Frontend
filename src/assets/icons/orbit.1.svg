<svg
  width="120"
  height="120"
  viewBox="0 0 120 120"
  fill="none"
  xmlns="http://www.w3.org/2000/svg"
>
  <defs>
    <linearGradient id="orbitGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3B82F6"/>
      <stop offset="100%" stop-color="#F59E0B"/>
    </linearGradient>
  </defs>

  <!-- Center -->
  <circle cx="60" cy="60" r="10" fill="url(#orbitGradient)" />

  <!-- Orbit 1 -->
  <ellipse
    cx="60"
    cy="60"
    rx="38"
    ry="16"
    stroke="url(#orbitGradient)"
    stroke-width="3"
    fill="none"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="0 60 60"
      to="360 60 60"
      dur="6s"
      repeatCount="indefinite"
    />
  </ellipse>

  <!-- Orbit 2 -->
  <ellipse
    cx="60"
    cy="60"
    rx="38"
    ry="16"
    stroke="url(#orbitGradient)"
    stroke-width="3"
    fill="none"
    transform="rotate(60 60 60)"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="60 60 60"
      to="420 60 60"
      dur="8s"
      repeatCount="indefinite"
    />
  </ellipse>

  <!-- Orbit 3 -->
  <ellipse
    cx="60"
    cy="60"
    rx="38"
    ry="16"
    stroke="url(#orbitGradient)"
    stroke-width="3"
    fill="none"
    transform="rotate(120 60 60)"
  >
    <animateTransform
      attributeName="transform"
      type="rotate"
      from="120 60 60"
      to="480 60 60"
      dur="10s"
      repeatCount="indefinite"
    />
  </ellipse>
</svg>
