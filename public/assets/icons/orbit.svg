<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="orbitGradient" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#5B7CFF"/>
      <stop offset="100%" stop-color="#8FD3F4"/>
    </linearGradient>
  </defs>

  <!-- Core planet -->
  <circle cx="60" cy="60" r="20" fill="url(#orbitGradient)" />

  <!-- Orbit rings -->
  <ellipse cx="60" cy="60" rx="42" ry="18" stroke="url(#orbitGradient)" stroke-width="3" transform="rotate(-20 60 60)" />
  <ellipse cx="60" cy="60" rx="42" ry="18" stroke="url(#orbitGradient)" stroke-width="3" transform="rotate(35 60 60)" />

  <!-- Small satellite -->
  <circle cx="95" cy="42" r="4" fill="#8FD3F4" />
</svg>
